---
# Rebuild NixOS hosts from flake
# Usage: Create a Task Template with extra variables:
#   flake_path: /path/to/flake (default: /etc/nixos)
#   rebuild_action: switch|boot|test (default: switch)

- name: NixOS Rebuild
  hosts: all
  become: yes
  gather_facts: no

  vars:
    flake_path: "/etc/nixos"
    rebuild_action: "switch"

  tasks:
    - name: Get hostname
      command: hostname
      register: hostname_result
      changed_when: false

    - name: Run nixos-rebuild
      command: >
        nixos-rebuild {{ rebuild_action }}
        --flake {{ flake_path }}#{{ hostname_result.stdout }}
      register: rebuild_result

    - name: Display rebuild output
      debug:
        msg: "{{ rebuild_result.stdout_lines[-10:] }}"
      when: rebuild_result.stdout_lines | length > 0
