# Example static inventory for Semaphore
# Copy this format when creating inventories in the Semaphore UI

# Hosts that need Nix installed
[new_hosts]
# IP/hostname    ansible_user=<ssh_user>   ansible_become=yes (if not root)
# 10.10.11.100   ansible_user=root
# 10.10.11.101   ansible_user=ubuntu        ansible_become=yes

# You can also use hostnames if DNS is configured
# newserver.deepwatercreature.com ansible_user=deepwatrcreatur ansible_become=yes

# Group variables (apply to all hosts in [new_hosts])
[new_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
